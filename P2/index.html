<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOM</title>

    <!-- Hoja de estilo externa CSS -->
    <link rel="stylesheet" href="estilo.css">

    <link rel="icon" href="icono.ico" type="image/x-icon">

    <!-- Hoja de javascript externa JS -->
    <script src="script.js" defer></script>
    <script src="crono.js" defer></script>
    
</head>
<body>

    <h1 class="titulo">BOOM</h1>
    
    <!-- Recuadro principal -->
    <div class="cajaprincipal">

        <div class="cajacontador">


            <div class="cajanumero">
                <p id="clave1">*</p>
            </div> <!--Fin caja numero-->

            <div class="cajanumero">
                <p id="clave2">*</p>
            </div> <!--Fin caja numero-->

            <div class="cajanumero">
                <p id="clave3">*</p>
            </div> <!--Fin caja numero-->

            <div class="cajanumero">
                <p id="clave4">*</p>
            </div> <!--Fin caja numero-->

            <p></p>  <!--OTRA FORMA EN FICHERO EXTERNO-->
            <h1 class="cronometro" style="padding-top: 30px;" id="display">0:0:0</h1>

            <p>
                Intentos restantes: <span id="intentos">7</span>
            </p>
        </div> <!--Fin caja contador-->


        <div class="cajacontador"> <!--Caja contador 2-->
            <div class="caja">
                <button class="tecla" id="tecla1">1</button>
                <button class="tecla" id="tecla2">2</button>
                <button class="tecla" id="tecla3">3</button>
            </div> <!--Fin caja-->

            <div class="caja">
                <button class="tecla" id="tecla4">4</button>
                <button class="tecla" id="tecla5">5</button>
                <button class="tecla" id="tecla6">6</button>
            </div> <!--Fin caja-->

            <div class="caja">
                <button class="tecla" id="tecla7">7</button>
                <button class="tecla" id="tecla8">8</button>
                <button class="tecla" id="tecla9">9</button>
            </div> <!--Fin caja-->

            <div class="caja">
                <button class="tecla" id="botonsecreto1">-</button>
                <button class="tecla" id="tecla0">0</button>
                <button class="tecla" id="botonsecreto2">-</button>
            </div> <!--Fin caja-->

            <div class="caja">
                <button class="tecla" id="start" style="font-size: xx-small;">Start</button>
                <button class="tecla" id="stop" style="font-size: xx-small;">Stop</button>
                <button class="tecla" id="reset" style="font-size: xx-small;">Reset</button>
            </div> <!--Fin caja-->

            <p style="color: rgba(red, green, blue, alpha)">.</p>
        </div> <!--Fin caja contador 2-->

    </div> <!--Fin caja principal-->
       
</body>
</html>
