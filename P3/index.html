<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invasión Alienígena: Mobile & PC</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="crono.js"></script>
    <script src="juego.js" defer></script>
</head>
<body>
    <div id="selector-overlay">
        <div class="selection-box">
            <h2>Elige como jugar</h2>
            <button id="btn-pc" class="boton">Ordenador (Teclado)</button>
            <button id="btn-mobile" class="boton">Móvil (Táctil)</button>
        </div>
    </div>

    <div id="game-container">
        <div id="ui-layer">
            <div id="stats">
                <p>Puntuación: <span id="score">0</span></p>
                <p>Tiempo: <span id="timer-display">0:0:0</span></p>
                <div id="lives-container">Vidas: </div>
            </div>
            <div id="energy-bar-container">
                <div id="energy-bar"></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls" class="hidden">
            <div id="btn-left" class="touch-btn">◀</div>
            <div id="btn-right" class="touch-btn">▶</div>
            <div id="btn-shoot" class="touch-btn">FUEGO</div>
        </div>

        <div id="message-overlay" class="hidden">
            <div id="message-content">
                <p id="message-text"></p>
                <button id="restart-button">Reiniciar</button>
            </div>
        </div>
    </div>
    <!-- <script src="juego2.js" defer></script> -->
</body>
</html>
