<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invasión Alienígena: Desafío Verde</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="crono.js"></script>
    <script src="juego.js" defer></script>
</head>
<body>
    <div id="login-overlay">
        <div class="selection-box">
            <h2>IDENTIFÍCATE, COMANDANTE</h2>
            <input type="text" id="username-input" placeholder="Nombre de usuario" maxlength="15">
            <button id="btn-start" class="boton">INICIAR MISIÓN</button>
        </div>
    </div>

    <div id="game-container">
        <div id="ui-layer">
            <div id="stats">
                <p>Puntuación: <span id="score">0</span></p>
                <p>Tiempo: <span id="timer-display">0:0:0</span></p>
                <div id="lives-container">Vidas: </div>
            </div>
            <div id="energy-bar-container">
                <div id="energy-bar"></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="message-overlay" class="hidden">
            <div id="message-content">
                <p id="message-text"></p>
                
                <div id="ranking-container" class="hidden">
                    <h3>TOP 10 PILOTOS (MENOR TIEMPO)</h3>
                    <table id="ranking-table">
                        <thead>
                            <tr><th>Pos</th><th>Nombre</th><th>Tiempo</th></tr>
                        </thead>
                        <tbody id="ranking-body"></tbody>
                    </table>
                </div>

                <button id="restart-button" onclick="window.location.href='https://vegagm.github.io/2025-2026-CSAAI-Practicas/P3/'">Restart</button>
            </div>
        </div>
    </div>
</body>
</html>
