<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot League Arcade</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Bot League</h1>
            <div id="scoreboard">
                <span id="state">Selecciona un modo para empezar</span>
            </div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="500"></canvas>
            
            <!-- Pantalla de Inicio / Menú -->
            <div id="overlay" class="overlay">
                <div id="menu">
                    <h2>Elige modo de juego</h2>
                    <button onclick="selectMode('3goals')">Partido a 3 goles</button>
                    <button onclick="selectMode('golden')">Gol de Oro</button>
                    <p class="controls-hint">Mover: Flechas | Girar: A/D | Chutar: Espacio (Mantener)</p>
                </div>
            </div>
        </div>
    </div>
    <script src="juego.js"></script>
</body>
</html>
